<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Изменение заказа</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        form { width: 400px; }
        label { display: block; margin-top: 15px; }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 20px;
            padding: 10px 15px;
            background: #2d6cdf;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        a { display: inline-block; margin-top: 15px; }
    </style>
</head>
<body>
<h1>Изменение заказа</h1>

<form method="post" th:action="@{/orders/{id}/edit(id=${order.orderId})}">
    <label>Статус</label>
    <select name="status">
        <option value="CREATED" th:selected="${order.status == 'CREATED'}">CREATED</option>
        <option value="PAID" th:selected="${order.status == 'PAID'}">PAID</option>
        <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
    </select>

    <label>Адрес доставки</label>
    <input type="text" name="shippingAddress" th:value="${order.shippingAddress}" required>

    <button type="submit">Сохранить</button>
</form>

<a th:href="@{/orders}">Вернуться к списку заказов</a>
</body>
</html>
